<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmdatAI - Final</title>
    <style>
        body { background: #000; color: #00ffa3; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .face { width: 220px; height: 220px; border-radius: 50%; background-image: url('https://i.ibb.co/vzB6yP2/karakter.jpg'); background-size: cover; border: 2px solid #1a1a1a; cursor: pointer; transition: 0.5s; }
        .active { box-shadow: 0 0 60px #00ffa3; border-color: #00ffa3; transform: scale(1.05); }
        #resp { padding: 25px; text-align: center; color: #fff; font-size: 1.2rem; max-width: 85%; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="micBtn" class="face" onclick="toggle()"></div>
    <div id="resp">Dokun ve konuş İmdat Bey. <br><small style="color:#00ffa3">Sistem Bağlantısı Test Ediliyor...</small></div>

    <script>
        // YENİ ALDIĞINIZ ANAHTARI BURAYA YAPIŞTIRIN
        const API_KEY = "AIzaSyBIjo1_q2JJgzlSc-EvLDGfUwuWTFCL1bU"; 

        let rec, isOn = false;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SR) {
            rec = new SR(); rec.lang = 'tr-TR';
            rec.onresult = async (e) => {
                const txt = e.results[0][0].transcript;
                document.getElementById('resp').innerText = "Düşünüyorum...";
                try {
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Sen İmdat Uysal'ın asistanısın. Kısa ve öz konuş. Soru: " + txt }] }] })
                    });
                    const d = await r.json();
                    if (d.candidates) {
                        const reply = d.candidates[0].content.parts[0].text;
                        document.getElementById('resp').innerText = reply;
                        const s = new SpeechSynthesisUtterance(reply); s.lang = 'tr-TR';
                        s.onend = () => { if(isOn) rec.start(); };
                        window.speechSynthesis.speak(s);
                    } else {
                        document.getElementById('resp').innerText = "Hata: " + (d.error ? d.error.message : "API Yanıt Vermedi");
                    }
                } catch (err) { 
                    document.getElementById('resp').innerText = "Bağlantı koptu. Tekrar deneyin.";
                }
            };
        }
        function toggle() {
            if (!isOn) { isOn = true; rec.start(); document.getElementById('micBtn').classList.add('active'); }
            else { isOn = false; rec.stop(); window.speechSynthesis.cancel(); document.getElementById('micBtn').classList.remove('active'); }
        }
    </script>
</body>
</html>
